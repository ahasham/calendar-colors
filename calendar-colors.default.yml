# calendar-colors.default.yml — SHIPPED defaults, no personal data.
# GENERATED from taxonomy.py (T1 migration step 1); values are byte-identical to
# the pre-refactor hardcoded scheme. User overrides live in the user config
# (~/.claude/config/calendar-colors.yml) and are deep-merged over this at load.
#
#   categories:  category -> {colorId (Google 1..11 or null), emoji, gmail label}
#   rules:       invariants enforced by taxonomy.validate_config()
#                color_merges     — category groups allowed to share a colorId
#                                   (errands+household deliberately share Graphite/8)
#                forbidden_on_work— purples banned on a work cal (Lavender/1 + Grape/3;
#                                   Blueberry/9 navy is allowed — carries career/interview)
#
# NOTE: keyword routing (_CATEGORY_KEYWORDS) intentionally stays in code — it is
# ordered, regex-coupled, and generic (not personal), so it is not published here.

