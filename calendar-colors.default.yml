# default per-calendar feature flags (a user `calendars:` row overrides these).
# NOTE: title_rewrite is owned by the title-rewrite subsystem, not the styling
# config, so it is intentionally absent here.
calendar_defaults:
  color: true
  emoji: true
# Allocation rules. color_merges = category groups DELIBERATELY sharing a colorId
# (validate_config requires every color collision to be declared here, so silent
# drift like the old 5-way Graphite pile-up is caught). Frequency principle: the
# most-frequent categories hold SOLO colorIds; a shared colorId is only legitimate
# for low-frequency and/or cross-calendar pairs, or a high-stakes category that
# claims its own color regardless of volume (interview). No two HIGH-frequency
# categories should share — validate_config soft-warns when a frequency map is
# supplied (see --frequency). high_frequency_threshold = events/6mo above which a
# category counts as "high" for that collision warning.
rules:
  color_merges:
  - - errands            # 2 Sage — home/chores (errands follows household)
    - household
  - - health             # 10 Basil — wellness pair (both low-frequency)
    - fitness
  - - career             # 9 Blueberry (navy) — the professional bucket; interviews ARE
    - interview          #   career/hiring events. Navy is allowed on work (see forbidden_on_work).
  - - broad_meeting      # 8 Graphite — the "recede" bucket (town halls + banners)
    - working_location
  - - partner            # 3 Grape — the couple (anniversary is rare)
    - anniversary
  - - birthday           # 1 Lavender — a date about a person (memorial is rare)
    - memorial
  high_frequency_threshold: 40
  # Purples banned on the work calendar (auto-recolored to gray if they'd land there).
  # Lavender(1, periwinkle) + Grape(3, magenta) stay banned — no purple for meetings.
  # Blueberry(9, indigo/navy) is ALLOWED (reads as dark blue, not purple): it carries
  # the career/interview professional bucket, and interviews live on the work cal.
  forbidden_on_work:
  - '1'
  - '3'
